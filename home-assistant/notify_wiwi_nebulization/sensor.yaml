{% set temp = states('sensor.asterstraat_geleen_temperature') | float(20) %}
{% set humidity = states('sensor.asterstraat_geleen_humidity') | float(50) %}

{# Substitua pelo ID real que você achou no Passo 1 #}
{% set pm25 = states('sensor.asterstraat_geleen_pm2_5') | float(0) %}
{% set o3 = states('sensor.asterstraat_geleen_ozone') | float(0) %}

{# LÓGICA CRÍTICA: Frio extremo, ar muito seco ou poluição perigosa #}
{% if temp < 16 or humidity < 35 or pm25 > 25 or o3 > 150 %}
  critico
{# LÓGICA RUIM: Frio leve, ar seco ou poluição moderada #}
{% elif temp < 18 or humidity < 45 or pm25 > 12 or o3 > 80 %}
  ruim
{% else %}
  normal
{% endif %}